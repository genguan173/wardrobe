  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{--sage:#B5C4B1;--sage-dark:#8FA88B;--rose:#D4A5A5;--cream:#F5F0EB;--warm:#E8D5C4;--taupe:#C4B5A5;--blue:#A8B5C4;--text:#4A4A4A;--text-light:#8A8A8A;--bg:#FAFAF8;--card:#FFFFFF;--line:#E8E4DF}
    body{font-family:-apple-system,'Hiragino Sans','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);padding-bottom:72px;letter-spacing:.02em;-webkit-font-smoothing:antialiased}
    .header{background:var(--bg);padding:18px 20px 14px;position:sticky;top:0;z-index:100;border-bottom:1px solid var(--line)}
    .header-row{display:flex;justify-content:space-between;align-items:center}
    .header h1{font-size:20px;font-weight:500;letter-spacing:.08em}
    .header-icons{display:flex;gap:16px;align-items:center}
    .header-icons svg{width:20px;height:20px;stroke:var(--text-light);stroke-width:1.5;fill:none}
    .quick-stats{display:flex;gap:0;padding:16px 20px;background:var(--card);border-bottom:1px solid var(--line)}
    .stat-item{flex:1;text-align:center;position:relative}
    .stat-item:not(:last-child)::after{content:'';position:absolute;right:0;top:4px;bottom:4px;width:1px;background:var(--line)}
    .stat-value{font-size:24px;font-weight:500;color:var(--sage-dark)}
    .stat-label{font-size:11px;color:var(--text-light);margin-top:2px}
    .page{display:none}.page.active{display:block}
    .filter-section{padding:12px 16px;background:var(--bg)}
    .filter-row{display:flex;gap:8px;align-items:center;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:8px}
    .filter-row::-webkit-scrollbar{display:none}
    .filter-chip{padding:6px 14px;border-radius:20px;font-size:12px;color:var(--text-light);background:var(--card);border:1px solid var(--line);white-space:nowrap;cursor:pointer;transition:all .2s}
    .filter-chip.active{background:var(--sage);color:#fff;border-color:var(--sage)}
    .filter-row-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
    .season-label{font-size:12px;color:var(--text-light)}
    .season-row{display:flex;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:4px}
    .season-row::-webkit-scrollbar{display:none}
    .season-chip{padding:4px 12px;border-radius:16px;font-size:11px;color:var(--text-light);background:var(--card);border:1px solid var(--line);white-space:nowrap;cursor:pointer;transition:all .2s}
    .season-chip.active{background:var(--warm);color:#fff;border-color:var(--warm)}
    .sort-btn{display:flex;align-items:center;gap:4px;padding:6px 12px;background:var(--card);border:1px solid var(--line);border-radius:16px;font-size:12px;color:var(--text-light);cursor:pointer;position:relative;flex-shrink:0}
    .sort-btn svg{width:14px;height:14px;stroke:var(--text-light);stroke-width:1.5;fill:none}
    .sort-dropdown{display:none;position:absolute;top:100%;right:0;margin-top:4px;background:var(--card);border:1px solid var(--line);border-radius:12px;box-shadow:0 4px 16px rgba(0,0,0,.08);z-index:50;min-width:120px;overflow:hidden}
    .sort-dropdown.show{display:block}
    .sort-option{padding:10px 14px;font-size:12px;color:var(--text);cursor:pointer;transition:background .15s}
    .sort-option:hover{background:var(--cream)}
    .sort-option.active{color:var(--sage-dark);font-weight:500}
    .wardrobe-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:12px 16px}
    .clothing-card{background:var(--card);border-radius:12px;overflow:hidden;border:1px solid var(--line);transition:transform .15s}
    .clothing-card:active{transform:scale(.97)}
    .clothing-img{width:100%;aspect-ratio:3/4;display:flex;align-items:center;justify-content:center;position:relative}
    .clothing-img svg{width:32px;height:32px;stroke:rgba(255,255,255,.7);stroke-width:1.5;fill:none}
    .g1{background:linear-gradient(135deg,#D4A5A5,#E8C4C4)}.g2{background:linear-gradient(135deg,#B5C4B1,#C4D4C0)}.g3{background:linear-gradient(135deg,#A8B5C4,#C4D0E0)}.g4{background:linear-gradient(135deg,#E8D5C4,#F0E0D0)}.g5{background:linear-gradient(135deg,#C4B5A5,#D4C4B4)}
    .season-tag{position:absolute;top:6px;right:6px;font-size:10px;background:rgba(255,255,255,.85);padding:2px 6px;border-radius:8px;backdrop-filter:blur(4px)}
    .clothing-info{padding:8px}
    .clothing-name{font-size:13px;font-weight:500;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .clothing-stats{font-size:10px;color:var(--text-light)}
    .outfit-section{padding:16px}
    .outfit-header{font-size:15px;font-weight:600;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
    .outfit-header span{color:var(--text-light);font-weight:400;font-size:13px}
    .outfit-card{display:flex;gap:14px;padding:14px;background:var(--card);border-radius:16px;border:1px solid var(--line);margin-bottom:12px}
    .outfit-thumb{width:64px;height:64px;border-radius:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
    .outfit-thumb svg{width:24px;height:24px;stroke:rgba(255,255,255,.7);stroke-width:1.5;fill:none}
    .outfit-body{flex:1}
    .outfit-date{font-size:13px;font-weight:500;margin-bottom:4px}
    .outfit-items{font-size:12px;color:var(--text-light);margin-bottom:6px;line-height:1.4}
    .outfit-cost{font-size:12px;color:var(--sage-dark);font-weight:500}
    .stats-section{padding:16px}
    .stats-title{font-size:15px;font-weight:600;margin-bottom:12px}
    .stats-overview{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:24px}
    .stat-card{background:var(--card);border-radius:14px;padding:16px;text-align:center;border:1px solid var(--line)}
    .stat-card .num{font-size:28px;font-weight:500;color:var(--sage-dark)}
    .stat-card .label{font-size:11px;color:var(--text-light);margin-top:4px}
    .freq-list{background:var(--card);border-radius:14px;border:1px solid var(--line);overflow:hidden;margin-bottom:24px}
    .freq-item{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--line)}
    .freq-item:last-child{border-bottom:none}
    .freq-name{font-size:13px;font-weight:500}
    .freq-detail{font-size:12px;color:var(--text-light)}
    .cat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
    .cat-card{background:var(--card);border-radius:14px;padding:16px;text-align:center;border:1px solid var(--line)}
    .cat-card .num{font-size:24px;font-weight:500;color:var(--sage-dark)}
    .cat-card .label{font-size:11px;color:var(--text-light);margin-top:4px}
    .rss-config{margin:12px 16px;padding:14px;background:var(--card);border-radius:14px;border:1px dashed var(--line)}
    .rss-config h3{font-size:13px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:6px}
    .rss-config h3 svg{width:16px;height:16px;stroke:var(--sage-dark);stroke-width:2;fill:none}
    .rss-input-group{display:flex;gap:8px;margin-bottom:10px}
    .rss-input-group input{flex:1;padding:8px 12px;border:1px solid var(--line);border-radius:10px;font-size:12px;outline:none;font-family:inherit}
    .rss-input-group input:focus{border-color:var(--sage)}
    .rss-input-group button{padding:8px 14px;background:var(--sage);color:#fff;border:none;border-radius:10px;font-size:12px;cursor:pointer;white-space:nowrap}
    .rss-presets{display:flex;flex-wrap:wrap;gap:6px}
    .rss-preset{padding:5px 10px;background:var(--cream);border:1px solid var(--line);border-radius:14px;font-size:11px;cursor:pointer;color:var(--text)}
    .rss-preset:hover{background:var(--sage);color:#fff;border-color:var(--sage)}
    .insp-tabs{display:flex;gap:0;padding:12px 16px 10px;background:var(--bg);position:sticky;top:60px;z-index:99}
    .insp-cat{padding:5px 14px;border-radius:18px;font-size:12px;color:var(--text-light);background:transparent;border:1px solid var(--line);cursor:pointer;transition:all .2s}
    .insp-cat.active{background:var(--sage);color:#fff;border-color:var(--sage)}
    .insp-feed{padding:8px 16px;display:flex;flex-direction:column;gap:12px}
    .insp-card{background:var(--card);border-radius:14px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.04);transition:transform .2s}
    .insp-card:active{transform:scale(.98)}
    .insp-card .cover{position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
    .insp-card .cover.wide{height:140px}.insp-card .cover.tall{height:200px}.insp-card .cover.square{height:160px}
    .cover-icon{width:48px;height:48px;stroke:rgba(255,255,255,.6);stroke-width:1;fill:none}
    .cover-plant{position:absolute;bottom:8px;right:8px;width:32px;height:32px;opacity:.4}
    .cover-plant svg{stroke:#fff;stroke-width:1;fill:none}
    .insp-card .body{padding:12px 14px}
    .insp-card .title{font-size:14px;font-weight:600;margin-bottom:4px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .insp-card .desc{font-size:12px;color:var(--text-light);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:8px}
    .insp-card .meta{display:flex;justify-content:space-between;align-items:center;font-size:10px;color:var(--text-light)}
    .insp-card .source{display:inline-flex;align-items:center;gap:3px;padding:2px 6px;background:var(--cream);border-radius:8px;font-size:9px}
    .insp-card .likes{display:flex;align-items:center;gap:3px}
    .insp-card .likes svg{width:12px;height:12px;fill:var(--rose);stroke:none}
    .loading{text-align:center;padding:40px 20px;color:var(--text-light);font-size:13px}
    .loading-spinner{width:28px;height:28px;border:3px solid var(--line);border-top-color:var(--sage);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .error-state{text-align:center;padding:40px 20px;color:var(--text-light)}
    .error-state svg{width:40px;height:40px;stroke:var(--taupe);stroke-width:1.5;fill:none;margin-bottom:10px}
    .error-state p{font-size:12px;margin-bottom:12px}
    .retry-btn{padding:7px 20px;background:var(--sage);color:#fff;border:none;border-radius:18px;font-size:12px;cursor:pointer}
    .plant-divider{display:flex;justify-content:center;padding:20px 0}
    .plant-divider svg{width:60px;height:20px;stroke:var(--sage);stroke-width:1.2;fill:none;opacity:.5}
    .fab{position:fixed;bottom:80px;right:20px;width:52px;height:52px;border-radius:50%;background:var(--sage);border:none;box-shadow:0 4px 16px rgba(181,196,177,.4);cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:90}
    .fab svg{width:24px;height:24px;stroke:#fff;stroke-width:2;fill:none}
    .bottom-nav{position:fixed;bottom:0;left:0;right:0;height:64px;background:var(--card);border-top:1px solid var(--line);display:flex;align-items:center;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
    .nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;padding:8px 0}
    .nav-btn svg{width:22px;height:22px;stroke:var(--text-light);stroke-width:1.5;fill:none}
    .nav-btn span{font-size:10px;color:var(--text-light)}
    .nav-btn.active svg{stroke:var(--sage-dark)}
    .nav-btn.active span{color:var(--sage-dark);font-weight:500}
    .install-banner{display:none;position:fixed;bottom:64px;left:16px;right:16px;background:var(--card);border-radius:16px;padding:16px;box-shadow:0 8px 32px rgba(0,0,0,.12);z-index:95;border:1px solid var(--line)}
    .install-banner.show{display:block}
    .install-row{display:flex;align-items:center;gap:12px}
    .install-icon{width:44px;height:44px;border-radius:12px;background:var(--sage);display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .install-icon svg{width:24px;height:24px;stroke:#fff;stroke-width:1.5;fill:none}
    .install-text{flex:1}
    .install-text .name{font-size:14px;font-weight:600}
    .install-text .hint{font-size:11px;color:var(--text-light);margin-top:2px}
    .install-actions{display:flex;gap:8px;margin-top:12px}
    .install-actions button{flex:1;padding:10px;border-radius:10px;font-size:13px;cursor:pointer;border:none}
    .btn-install{background:var(--sage);color:#fff}
    .btn-later{background:var(--cream);color:var(--text)}
  </style>
</head>
<body>
  <header class="header">
    <div class="header-row">
      <h1 id="page-title">衣橱</h1>
      <div class="header-icons">
        <svg viewBox="0 0 32 32"><path d="M16 28 Q16 20 16 12"/><path d="M16 22 Q10 18 6 14"/><path d="M16 18 Q22 14 26 10"/><circle cx="6" cy="14" r="4" fill="var(--sage)" opacity="0.3"/><circle cx="26" cy="10" r="4" fill="var(--sage)" opacity="0.3"/></svg>
      </div>
    </div>
  </header>

  <div class="quick-stats">
    <div class="stat-item"><div class="stat-value" id="stat-total">0</div><div class="stat-label">衣物</div></div>
    <div class="stat-item"><div class="stat-value" id="stat-outfits">0</div><div class="stat-label">穿搭</div></div>
    <div class="stat-item"><div class="stat-value" id="stat-avg">¥0</div><div class="stat-label">次均成本</div></div>
  </div>

  <div class="page active" id="page-wardrobe">
    <div class="filter-section">
      <div class="filter-row-header">
        <div class="filter-row" id="category-filters">
          <button class="filter-chip active" onclick="filterCategory('all',this)">全部</button>
          <button class="filter-chip" onclick="filterCategory('top',this)">上装</button>
          <button class="filter-chip" onclick="filterCategory('bottom',this)">下装</button>
          <button class="filter-chip" onclick="filterCategory('outerwear',this)">外套</button>
          <button class="filter-chip" onclick="filterCategory('dress',this)">连衣裙</button>
          <button class="filter-chip" onclick="filterCategory('shoes',this)">鞋</button>
          <button class="filter-chip" onclick="filterCategory('accessory',this)">配饰</button>
        </div>
        <div class="sort-btn" onclick="toggleSort(this)">
          <svg viewBox="0 0 24 24"><path d="M3 6h18M3 12h12M3 18h6"/></svg>
          <span>排序</span>
          <div class="sort-dropdown" id="sort-dropdown">
            <div class="sort-option active" onclick="setSort(this,'date')">加入时间</div>
            <div class="sort-option" onclick="setSort(this,'frequency')">穿着频率</div>
            <div class="sort-option" onclick="setSort(this,'cost')">穿着成本</div>
          </div>
        </div>
      </div>
      <div class="season-label">季节</div>
      <div class="season-row" id="season-filters">
        <button class="season-chip active" onclick="filterSeason('all',this)">全部</button>
        <button class="season-chip" onclick="filterSeason('spring',this)">🌸 春</button>
        <button class="season-chip" onclick="filterSeason('summer',this)">☀️ 夏</button>
        <button class="season-chip" onclick="filterSeason('autumn',this)">🍂 秋</button>
        <button class="season-chip" onclick="filterSeason('winter',this)">❄️ 冬</button>
      </div>
    </div>
    <div class="wardrobe-grid" id="wardrobe-grid"></div>
    <div class="plant-divider">
      <svg viewBox="0 0 60 20"><path d="M0 10 Q15 10 30 10 Q45 10 60 10"/><path d="M15 10 Q12 6 10 4"/><path d="M30 10 Q28 5 26 3"/><path d="M45 10 Q48 6 50 4"/><circle cx="10" cy="4" r="2.5" fill="var(--sage)" opacity="0.3"/><circle cx="26" cy="3" r="2.5" fill="var(--sage)" opacity="0.3"/><circle cx="50" cy="4" r="2.5" fill="var(--sage)" opacity="0.3"/></svg>
    </div>
  </div>

  <div class="page" id="page-outfit">
    <div class="outfit-section">
      <div class="outfit-header">最近穿搭 <span id="outfit-count">共 0 次</span></div>
      <div id="outfit-list"></div>
    </div>
  </div>

  <div class="page" id="page-stats">
    <div class="stats-section">
      <div class="stats-title">总览</div>
      <div class="stats-overview">
        <div class="stat-card"><div class="num" id="stat2-total">0</div><div class="label">衣物总数</div></div>
        <div class="stat-card"><div class="num" id="stat2-outfits">0</div><div class="label">穿搭记录</div></div>
        <div class="stat-card"><div class="num" id="stat2-avg">¥0</div><div class="label">次均成本</div></div>
        <div class="stat-card"><div class="num" id="stat2-value">¥0</div><div class="label">衣橱总值</div></div>
      </div>
      <div class="stats-title">穿着频率</div>
      <div class="freq-list" id="freq-list"></div>
      <div class="stats-title">品类分布</div>
      <div class="cat-grid" id="cat-grid"></div>
    </div>
  </div>

  <div class="page" id="page-insp">
    <div class="rss-config" id="rss-config">
      <h3><svg viewBox="0 0 24 24"><path d="M4 11a9 9 0 019 9M4 4a16 16 0 0116 16"/><circle cx="4" cy="19" r="2"/></svg> RSS 订阅源</h3>
      <div class="rss-input-group">
        <input type="text" id="rss-url-input" placeholder="输入 RSS 链接...">
        <button onclick="addCustomRSS()">添加</button>
      </div>
      <div class="rss-presets">
        <button class="rss-preset" onclick="loadPreset('vogue')">📰 Vogue</button>
        <button class="rss-preset" onclick="loadPreset('elle')">📰 ELLE</button>
        <button class="rss-preset" onclick="loadPreset('hypebeast')">👟 Hypebeast</button>
        <button class="rss-preset" onclick="loadPreset('refinery29')">✨ Refinery29</button>
        <button class="rss-preset" onclick="loadPreset('all')">📚 全部加载</button>
      </div>
    </div>
    <div class="insp-tabs">
      <button class="insp-cat active" onclick="switchInspTab('all',this)">全部</button>
      <button class="insp-cat" onclick="switchInspTab('fashion',this)">时尚资讯</button>
      <button class="insp-cat" onclick="switchInspTab('street',this)">街头穿搭</button>
      <button class="insp-cat" onclick="switchInspTab('tips',this)">穿搭技巧</button>
    </div>
    <div class="insp-feed" id="insp-feed">
      <div class="loading">点击上方预设按钮加载内容</div>
    </div>
  </div>

  <button class="fab" onclick="alert('添加衣物功能开发中...')">
    <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>

  <nav class="bottom-nav">
    <button class="nav-btn active" data-page="wardrobe" onclick="switchPage('wardrobe')"><svg viewBox="0 0 24 24"><path d="M12 4 L4 10 L4 20 L10 20 L10 14 L14 14 L14 20 L20 20 L20 10Z"/></svg><span>衣橱</span></button>
    <button class="nav-btn" data-page="outfit" onclick="switchPage('outfit')"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="12" cy="12" r="4"/></svg><span>穿搭</span></button>
    <button class="nav-btn" data-page="stats" onclick="switchPage('stats')"><svg viewBox="0 0 24 24"><rect x="3" y="12" width="4" height="9" rx="1"/><rect x="10" y="7" width="4" height="14" rx="1"/><rect x="17" y="3" width="4" height="18" rx="1"/></svg><span>统计</span></button>
    <button class="nav-btn" data-page="insp" onclick="switchPage('insp')"><svg viewBox="0 0 24 24"><polygon points="12,2 15,9 22,9 16,14 18,22 12,17 6,22 8,14 2,9 9,9"/></svg><span>灵感</span></button>
  </nav>

  <div class="install-banner" id="install-banner">
    <div class="install-row">
      <div class="install-icon"><svg viewBox="0 0 24 24"><path d="M12 4 L4 10 L4 20 L10 20 L10 14 L14 14 L14 20 L20 20 L20 10Z"/></svg></div>
      <div class="install-text"><div class="name">wear 穿</div><div class="hint">添加到主屏幕，快速打开</div></div>
    </div>
    <div class="install-actions">
      <button class="btn-later" onclick="dismissInstall()">稍后</button>
      <button class="btn-install" onclick="doInstall()">安装</button>
    </div>
  </div>

  <script>
    var STORAGE_KEY='wardrobe_data',RSS_CACHE_KEY='wardrobe_rss_cache';
    var sampleData={clothing:[
      {id:1,name:'白衬衫',category:'top',season:'summer',price:149,wears:12,gradient:'g2',added:'2026-03-01'},
      {id:2,name:'卡其裤',category:'bottom',season:'autumn',price:299,wears:8,gradient:'g4',added:'2026-03-05'},
      {id:3,name:'针织开衫',category:'outerwear',season:'winter',price:380,wears:5,gradient:'g1',added:'2026-02-15'},
      {id:4,name:'帆布鞋',category:'shoes',season:'spring',price:239,wears:15,gradient:'g3',added:'2026-01-20'},
      {id:5,name:'碎花裙',category:'dress',season:'summer',price:249,wears:3,gradient:'g1',added:'2026-04-01'},
      {id:6,name:'托特包',category:'accessory',season:'spring',price:299,wears:10,gradient:'g5',added:'2026-02-28'},
      {id:7,name:'羊毛大衣',category:'outerwear',season:'winter',price:899,wears:2,gradient:'g4',added:'2026-01-10'},
      {id:8,name:'亚麻短裤',category:'bottom',season:'summer',price:149,wears:6,gradient:'g2',added:'2026-04-15'},
      {id:9,name:'条纹T恤',category:'top',season:'spring',price:99,wears:9,gradient:'g3',added:'2026-03-20'},
      {id:10,name:'牛仔外套',category:'outerwear',season:'autumn',price:359,wears:7,gradient:'g5',added:'2026-02-10'},
      {id:11,name:'丝巾',category:'accessory',season:'spring',price:129,wears:4,gradient:'g1',added:'2026-04-05'},
      {id:12,name:'乐福鞋',category:'shoes',season:'autumn',price:459,wears:6,gradient:'g4',added:'2026-03-15'}
    ],outfits:[
      {id:1,date:'2026-05-09',items:['白衬衫','卡其裤','帆布鞋'],occasion:'',cost:26},
      {id:2,date:'2026-05-08',items:['针织开衫','碎花裙'],occasion:'通勤',cost:112.7},
      {id:3,date:'2026-05-07',items:['白衬衫','碎花裙','托特包'],occasion:'',cost:37.7},
      {id:4,date:'2026-05-06',items:['条纹T恤','亚麻短裤','帆布鞋'],occasion:'周末',cost:16.1},
      {id:5,date:'2026-05-05',items:['白衬衫','卡其裤','乐福鞋'],occasion:'通勤',cost:42.3}
    ]};

    function loadData(){try{var s=localStorage.getItem(STORAGE_KEY);if(s)return JSON.parse(s)}catch(e){}return sampleData}
    function saveData(d){localStorage.setItem(STORAGE_KEY,JSON.stringify(d))}
    var appData=loadData();
    var currentCategory='all',currentSeason='all',currentSort='date';
    var pageTitles={wardrobe:'衣橱',outfit:'穿搭',stats:'统计',insp:'灵感'};

    function switchPage(page){
      document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active')});
      document.querySelectorAll('.nav-btn').forEach(function(b){b.classList.remove('active')});
      document.getElementById('page-'+page).classList.add('active');
      document.querySelector('[data-page="'+page+'"]').classList.add('active');
      document.getElementById('page-title').textContent=pageTitles[page]||'wear 穿';
    }

    function updateQuickStats(){
      var t=appData.clothing.length,o=appData.outfits.length;
      var avg=o>0?(appData.outfits.reduce(function(s,x){return s+x.cost},0)/o).toFixed(1):'0';
      document.getElementById('stat-total').textContent=t;
      document.getElementById('stat-outfits').textContent=o;
      document.getElementById('stat-avg').textContent='¥'+avg;
    }

    function getClothingIcon(cat){
      var icons={top:'<path d="M8 4 L4 10 L4 20 L20 20 L20 10 L16 4 L12 8Z"/>',bottom:'<path d="M6 4 L18 4 L16 20 L12 14 L8 20Z"/>',outerwear:'<path d="M12 4 L4 10 L4 20 L10 20 L10 14 L14 14 L14 20 L20 20 L20 10Z"/>',dress:'<path d="M12 4 L8 4 L4 20 L20 20 L16 4Z"/>',shoes:'<path d="M4 16 L20 16 L20 20 L4 20Z M6 16 L8 10 L16 10 L18 16"/>',accessory:'<circle cx="12" cy="12" r="8"/>'};
      return icons[cat]||icons.top;
    }
    function getSeasonEmoji(s){var e={spring:'🌸',summer:'☀️',autumn:'🍂',winter:'❄️'};return e[s]||''}

    function renderWardrobe(){
      var grid=document.getElementById('wardrobe-grid');
      var items=appData.clothing.slice();
      if(currentCategory!=='all')items=items.filter(function(c){return c.category===currentCategory});
      if(currentSeason!=='all')items=items.filter(function(c){return c.season===currentSeason});
      if(currentSort==='frequency')items.sort(function(a,b){return b.wears-a.wears});
      else if(currentSort==='cost')items.sort(function(a,b){return(a.price/Math.max(a.wears,1))-(b.price/Math.max(b.wears,1))});
      else items.sort(function(a,b){return new Date(b.added)-new Date(a.added)});
      if(items.length===0){grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-light);font-size:13px">暂无衣物</div>';return}
      grid.innerHTML=items.map(function(c){
        var avg=(c.price/Math.max(c.wears,1)).toFixed(0);
        return '<div class="clothing-card"><div class="clothing-img '+c.gradient+'"><svg viewBox="0 0 24 24">'+getClothingIcon(c.category)+'</svg><span class="season-tag">'+getSeasonEmoji(c.season)+'</span></div><div class="clothing-info"><div class="clothing-name">'+c.name+'</div><div class="clothing-stats">穿 '+c.wears+' 次 · ¥'+avg+'/次</div></div></div>';
      }).join('');
    }

    function filterCategory(cat,el){currentCategory=cat;document.querySelectorAll('#category-filters .filter-chip').forEach(function(c){c.classList.remove('active')});el.classList.add('active');renderWardrobe()}
    function filterSeason(s,el){currentSeason=s;document.querySelectorAll('#season-filters .season-chip').forEach(function(c){c.classList.remove('active')});el.classList.add('active');renderWardrobe()}
    function toggleSort(btn){document.getElementById('sort-dropdown').classList.toggle('show')}
    function setSort(el,type){currentSort=type;document.querySelectorAll('.sort-option').forEach(function(o){o.classList.remove('active')});el.classList.add('active');document.getElementById('sort-dropdown').classList.remove('show');renderWardrobe()}

    function renderOutfits(){
      var list=document.getElementById('outfit-list');
      document.getElementById('outfit-count').textContent='共 '+appData.outfits.length+' 次';
      if(appData.outfits.length===0){list.innerHTML='<div class="loading">暂无穿搭记录</div>';return}
      var grads=['g1','g2','g3','g4','g5'];
      list.innerHTML=appData.outfits.map(function(o){
        var g=grads[o.id%5],d=o.date.replace(/-/g,'.'),it=o.items.join(' · '),oc=o.occasion?' · '+o.occasion:'';
        return '<div class="outfit-card"><div class="outfit-thumb '+g+'"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="12" cy="12" r="4"/></svg></div><div class="outfit-body"><div class="outfit-date">'+d+oc+'</div><div class="outfit-items">'+it+'</div><div class="outfit-cost">¥'+o.cost.toFixed(1)+'</div></div></div>';
      }).join('');
    }

    function renderStats(){
      var t=appData.clothing.length,o=appData.outfits.length;
      var avg=o>0?(appData.outfits.reduce(function(s,x){return s+x.cost},0)/o).toFixed(1):'0';
      var tv=appData.clothing.reduce(function(s,c){return s+c.price},0);
      document.getElementById('stat2-total').textContent=t;
      document.getElementById('stat2-outfits').textContent=o;
      document.getElementById('stat2-avg').textContent='¥'+avg;
      document.getElementById('stat2-value').textContent='¥'+tv.toLocaleString();
      var fl=document.getElementById('freq-list');
      var sorted=appData.clothing.slice().sort(function(a,b){return b.wears-a.wears}).slice(0,6);
      fl.innerHTML=sorted.map(function(c){var a=(c.price/Math.max(c.wears,1)).toFixed(0);return '<div class="freq-item"><div class="freq-name">'+c.name+'</div><div class="freq-detail">'+c.wears+' 次 · ¥'+a+'/次</div></div>'}).join('');
      var cg=document.getElementById('cat-grid');
      var cats={top:'上装',bottom:'下装',outerwear:'外套',dress:'连衣裙',shoes:'鞋',accessory:'其他'};
      var counts={};appData.clothing.forEach(function(c){var k=cats[c.category]||'其他';counts[k]=(counts[k]||0)+1});
      cg.innerHTML=Object.keys(counts).map(function(k){return '<div class="cat-card"><div class="num">'+counts[k]+'</div><div class="label">'+k+'</div></div>'}).join('');
    }

    // RSS
    var RSS_PRESETS={
      vogue:{name:'Vogue',url:'https://www.vogue.com/feed',category:'fashion'},
      elle:{name:'ELLE',url:'https://www.elle.com/rss/fashion/',category:'fashion'},
      hypebeast:{name:'Hypebeast',url:'https://hypebeast.com/fashion/feed',category:'street'},
      refinery29:{name:'Refinery29',url:'https://www.refinery29.com/style/feed.xml',category:'tips'}
    };
    var CORS_PROXY='https://api.allorigins.win/raw?url=';
    var allArticles=[];

    function loadRSSCache(){try{var c=localStorage.getItem(RSS_CACHE_KEY);if(c){var d=JSON.parse(c);if(Date.now()-d.timestamp<3600000){allArticles=d.articles;renderArticles(allArticles);return true}}}catch(e){}return false}
    function saveRSSCache(a){try{localStorage.setItem(RSS_CACHE_KEY,JSON.stringify({timestamp:Date.now(),articles:a}))}catch(e){}}

    function fetchRSS(url){
      return fetch(CORS_PROXY+encodeURIComponent(url)).then(function(r){
        if(!r.ok)throw new Error('Network error');
        return r.text();
      }).then(function(text){
        var parser=new DOMParser();
        var xml=parser.parseFromString(text,'text/xml');
        if(xml.querySelector('parsererror'))throw new Error('XML parse error');
        var items=xml.querySelectorAll('item');
        var articles=[];
        items.forEach(function(item){
          var title=item.querySelector('title');title=title?title.textContent:'Untitled';
          var link=item.querySelector('link');link=link?link.textContent:'#';
          var desc=item.querySelector('description');desc=desc?desc.textContent:'';
          var pubDate=item.querySelector('pubDate');pubDate=pubDate?pubDate.textContent:'';
          var media=item.querySelector('media\\:content, enclosure');
          var image=media?media.getAttribute('url'):'';
          var cleanDesc=desc.replace(/<[^>]*>/g,'').substring(0,150);
          var date=pubDate?new Date(pubDate).toLocaleDateString('zh-CN'):'';
          articles.push({title:title,link:link,desc:cleanDesc,date:date,image:image});
        });
        return articles;
      }).catch(function(e){console.error('RSS error:',e);return[]});
    }

    function renderArticles(articles){
      var feed=document.getElementById('insp-feed');
      if(articles.length===0){
        feed.innerHTML='<div class="error-state"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><p>无法加载内容，请检查网络或 RSS 链接</p><button class="retry-btn" onclick="loadPreset(\'all\')">重新加载</button></div>';
        return;
      }
      var grads=['g1','g2','g3','g4','g5'],heights=['wide','tall','square'];
      feed.innerHTML=articles.map(function(a,i){
        var imgHtml=a.image?'<img src="'+a.image+'" style="width:100%;height:100%;object-fit:cover;" onerror="this.outerHTML=\'<svg class=\\\'cover-icon\\\' viewBox=\\\'0 0 40 40\\\'><path d=\\\'M20 4 L36 14 L36 30 L20 36 L4 30 L4 14Z\\\'/><circle cx=\\\'20\\\' cy=\\\'20\\\' r=\\\'6\\\'/></svg>\'">':'<svg class="cover-icon" viewBox="0 0 40 40"><path d="M20 4 L36 14 L36 30 L20 36 L4 30 L4 14Z"/><circle cx="20" cy="20" r="6"/></svg>';
        return '<div class="insp-card" onclick="window.open(\''+a.link+'\',\'_blank\')"><div class="cover '+heights[i%3]+' '+grads[i%5]+'">'+imgHtml+'<div class="cover-plant"><svg viewBox="0 0 40 40"><path d="M20 36 Q20 28 20 20"/><path d="M20 28 Q14 24 10 20"/><path d="M20 24 Q26 20 30 16"/><circle cx="10" cy="20" r="3"/><circle cx="30" cy="16" r="3"/></svg></div></div><div class="body"><div class="title">'+a.title+'</div><div class="desc">'+a.desc+'</div><div class="meta"><span class="source">'+(a.source||'RSS')+'</span><div class="likes"><svg viewBox="0 0 24 24"><path d="M12 21C12 21 3 13.5 3 8.5C3 5.42 5.42 3 8.5 3C10.24 3 11.91 3.81 12 5C12.09 3.81 13.76 3 15.5 3C18.58 3 21 5.42 21 8.5C21 13.5 12 21 12 21Z"/></svg> '+Math.floor(Math.random()*200+20)+'</div></div></div></div>';
      }).join('');
    }

    function loadPreset(key){
      if(key==='all'&&loadRSSCache())return;
      var feed=document.getElementById('insp-feed');
      feed.innerHTML='<div class="loading"><div class="loading-spinner"></div><div>正在加载内容...</div></div>';
      var sources=key==='all'?Object.values(RSS_PRESETS):[RSS_PRESETS[key]];
      allArticles=[];
      var promises=sources.map(function(src){
        return fetchRSS(src.url).then(function(articles){
          return articles.map(function(a){return{title:a.title,link:a.link,desc:a.desc,date:a.date,image:a.image,category:src.category,source:src.name}});
        });
      });
      Promise.all(promises).then(function(results){
        results.forEach(function(arts){allArticles=allArticles.concat(arts)});
        allArticles.sort(function(a,b){return new Date(b.date)-new Date(a.date)});
        saveRSSCache(allArticles);
        renderArticles(allArticles);
      });
    }

    function addCustomRSS(){
      var input=document.getElementById('rss-url-input');
      var url=input.value.trim();if(!url)return;
      var name=prompt('给这个订阅源起个名字：','自定义源');if(!name)return;
      RSS_PRESETS['custom_'+Date.now()]={name:name,url:url,category:'fashion'};
      var container=document.querySelector('.rss-presets');
      var btn=document.createElement('button');btn.className='rss-preset';btn.textContent='📌 '+name;
      btn.onclick=function(){loadRSS(url,'fashion',name)};container.appendChild(btn);
      input.value='';loadRSS(url,'fashion',name);
    }

    function loadRSS(url,cat,name){
      var feed=document.getElementById('insp-feed');
      feed.innerHTML='<div class="loading"><div class="loading-spinner"></div><div>正在加载 '+name+'...</div></div>';
      fetchRSS(url).then(function(articles){
        allArticles=articles.map(function(a){return{title:a.title,link:a.link,desc:a.desc,date:a.date,image:a.image,category:cat,source:name}});
        renderArticles(allArticles);
      });
    }

    function switchInspTab(cat,el){
      document.querySelectorAll('.insp-cat').forEach(function(c){c.classList.remove('active')});
      el.classList.add('active');
      if(cat==='all')renderArticles(allArticles);
      else renderArticles(allArticles.filter(function(a){return a.category===cat}));
    }

    // Install
    var deferredPrompt;
    window.addEventListener('beforeinstallprompt',function(e){e.preventDefault();deferredPrompt=e;document.getElementById('install-banner').classList.add('show')});
    function dismissInstall(){document.getElementById('install-banner').classList.remove('show')}
    function doInstall(){if(deferredPrompt){deferredPrompt.prompt();deferredPrompt.userChoice.then(function(r){if(r.outcome==='accepted')dismissInstall()});deferredPrompt=null}}

    // Close sort dropdown on outside click
    document.addEventListener('click',function(e){
      if(!e.target.closest('.sort-btn')&&!e.target.closest('.sort-dropdown')){
        document.getElementById('sort-dropdown').classList.remove('show');
      }
    });

    // Init
    updateQuickStats();
    renderWardrobe();
    renderOutfits();
    renderStats();
  </script>

  <script>
    if('serviceWorker'in navigator){
      navigator.serviceWorker.register('./sw.js').catch(function(){});
    }
  </script>
</body>
</html>
